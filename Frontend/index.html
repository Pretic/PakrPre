<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PakrPre legacy frontend</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#fff;color:#171717}
    main{width:min(90vw,520px);border:1px solid #e8e8e8;border-radius:12px;padding:28px;box-shadow:0 16px 48px rgba(0,0,0,.06)}
    h1{font-size:22px;margin:0 0 10px}
    p{margin:0 0 16px;color:#555;line-height:1.7}
    code{background:#f5f5f5;border:1px solid #eee;border-radius:5px;padding:1px 5px}
    a{color:#111;font-weight:700}
  </style>
</head>
<body>
  <main>
    <h1>这个目录已不再作为部署入口</h1>
    <p>PakrPre 当前版本应部署仓库根目录，使用根目录的 <code>index.html</code> 和 <code>_worker.js</code>。</p>
    <p>如果你正在配置 Cloudflare Pages，请把 Build output directory 设为 <code>/</code>，或直接参考根目录 <a href="../README.md">README</a>。</p>
  </main>
</body>
</html>
