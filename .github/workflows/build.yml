name: Build APK
run-name: Build ${{ inputs.build_id }} / ${{ inputs.package_name }}
on:
  workflow_dispatch:
    inputs:
      build_id:
        description: Unique build ID
        required: false
        default: ""
      app_url:
        description: Target URL
        required: true
      app_name:
        description: App Name
        required: true
      package_name:
        description: Package Name
        required: true
      version_name:
        description: Version Name
        required: true
        default: 1.0.0
      icon_url:
        description: Icon Image URL
        required: false
        default: ""
      icon_mode:
        description: Icon mode (url/generated)
        required: false
        default: "generated"
      icon_color:
        description: Generated icon color
        required: false
        default: "#BF3EFF"
      ua_mode:
        description: User agent mode (auto/android/iphone/harmonyos/android_pad/ipad)
        required: false
        default: "auto"
      no_screenshot:
        description: Disable screenshot (true/false)
        required: false
        default: "false"
      show_disclaimer:
        description: Show app disclaimer on first launch (true/false)
        required: false
        default: "false"
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Inject parameters
        run: |
          # Escape values before replacing template placeholders.
          URL="${{ github.event.inputs.app_url }}"
          URL_ESC=$(printf '%s\n' "$URL" | sed 's/[&/\]/\\&/g')
          sed -i "s|{{APP_URL}}|${URL_ESC}|g" app/src/main/java/com/webviewapp/MainActivity.kt

          PKG="${{ github.event.inputs.package_name }}"
          sed -i "s|{{APP_PACKAGE}}|${PKG}|g" app/src/main/AndroidManifest.xml app/build.gradle

          NAME="${{ github.event.inputs.app_name }}"
          NAME_XML=$(echo "$NAME" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g; s/"/\&quot;/g; s/'"'"'/\&apos;/g')
          sed -i "s|{{APP_NAME}}|${NAME_XML}|g" app/src/main/res/values/strings.xml app/src/main/AndroidManifest.xml

          VER="${{ github.event.inputs.version_name }}"
          VC=$(date +%s)
          sed -i "s|{{VERSION_NAME}}|${VER}|g" app/build.gradle
          sed -i "s|{{VERSION_CODE}}|${VC}|g" app/build.gradle

          PKG_PATH=$(echo $PKG | sed 's/\./\//g')
          echo "PKG_PATH is: $PKG_PATH"
          mkdir -p app/src/main/java/$PKG_PATH
          sed -i "s|package com.webviewapp|package $PKG|g" app/src/main/java/com/webviewapp/*.kt
          mv app/src/main/java/com/webviewapp/*.kt app/src/main/java/$PKG_PATH/
          sed -i "s|com.webviewapp|$PKG|g" app/src/main/res/layout/activity_main.xml

          NO_SS="${{ github.event.inputs.no_screenshot }}"
          sed -i "s|{{NO_SCREENSHOT}}|${NO_SS:-false}|g" app/src/main/java/$PKG_PATH/MainActivity.kt
          UA_MODE="${{ github.event.inputs.ua_mode }}"
          sed -i "s|{{UA_MODE}}|${UA_MODE:-auto}|g" app/src/main/java/$PKG_PATH/MainActivity.kt

          SHOW_DISC="${{ github.event.inputs.show_disclaimer }}"
          sed -i "s|{{SHOW_DISCLAIMER}}|${SHOW_DISC:-false}|g" app/src/main/java/$PKG_PATH/SplashActivity.kt

      - name: Process icon
        env:
          ICON_URL: ${{ github.event.inputs.icon_url }}
          ICON_MODE: ${{ github.event.inputs.icon_mode }}
          ICON_COLOR: ${{ github.event.inputs.icon_color }}
          APP_NAME: ${{ github.event.inputs.app_name }}
          PACKAGE_NAME: ${{ github.event.inputs.package_name }}
        run: |
          pip install Pillow -q
          python3 Scripts/process_icon.py

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          echo "=== APK output files ==="
          find app/build/outputs/apk -name '*.apk' 2>/dev/null || echo "No APKs found"
          KS_B64="${{ secrets.KEYSTORE_BASE64 }}"
          if [ -n "$KS_B64" ]; then
            echo "Using configured GitHub Actions keystore secrets."
            echo "$KS_B64" | base64 --decode > /tmp/release.keystore
            KS_PASS="${{ secrets.KEYSTORE_PASSWORD }}"
            KEY_ALIAS="${{ secrets.KEY_ALIAS }}"
            KEY_PASS="${{ secrets.KEY_PASSWORD }}"
          else
            echo "No keystore secrets configured; using PakrPre deterministic auto development signing."
            KS_PASS="android"; KEY_ALIAS="pakrpre_auto"; KEY_PASS="android"
            AUTO_SIGNING_SEED="pakrpre-auto-signing-v1:${GITHUB_REPOSITORY}:${{ github.event.inputs.package_name }}"
            javac --add-exports java.base/sun.security.x509=ALL-UNNAMED Scripts/CreateDeterministicKeystore.java
            java --add-exports java.base/sun.security.x509=ALL-UNNAMED -cp Scripts CreateDeterministicKeystore \
              /tmp/release.keystore "$KEY_ALIAS" "$KS_PASS" "$KEY_PASS" "$AUTO_SIGNING_SEED"
          fi
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          SAFE=$(echo "${{ github.event.inputs.package_name }}" | LC_ALL=C tr -cd 'A-Za-z0-9_.-')
          [ -z "$SAFE" ] && SAFE="app"
          VER="${{ github.event.inputs.version_name }}"
          mkdir -p /tmp/signed
          for APK in $(find app/build/outputs/apk -name '*.apk' 2>/dev/null); do
            ABI=$(echo "$APK" | grep -oE 'arm64-v8a|armeabi-v7a' || echo "universal")
            OUT="/tmp/signed/${SAFE}_${VER}_${ABI}.apk"
            $ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign -f -p 4 "$APK" /tmp/aligned_${ABI}.apk
            $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
              --ks /tmp/release.keystore --ks-pass "pass:$KS_PASS" \
              --ks-key-alias "$KEY_ALIAS" --key-pass "pass:$KEY_PASS" \
              --out "$OUT" /tmp/aligned_${ABI}.apk
            echo "Signed: $OUT"
          done
          echo "APK_BASE=${SAFE}_${VER}" >> $GITHUB_ENV

      - name: Upload APK arm64-v8a
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_BASE }}_arm64-v8a
          path: /tmp/signed/*arm64-v8a*.apk
          compression-level: 0
          retention-days: 7
          if-no-files-found: warn

      - name: Upload APK armeabi-v7a
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_BASE }}_armeabi-v7a
          path: /tmp/signed/*armeabi-v7a*.apk
          compression-level: 0
          retention-days: 7
          if-no-files-found: warn
